<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MailTub — Disposable Email</title>
    <meta name="description" content="Self-hosted disposable email service by DML Labs. Instant, private, no sign-up required." />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a10" />

    <!-- Apply saved theme before React renders to prevent flash -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('mailtub_theme') || 'dark'
          var resolved = t === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : t
          document.documentElement.classList.add(resolved)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts: Plus Jakarta Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
